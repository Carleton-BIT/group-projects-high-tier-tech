
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Carleton Map</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
            min-height: 100vh;
        }

        /* HEADER */
        header {
            text-align: center;
            padding: 25px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        /* NAV */
        nav {
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        nav a {
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            position: relative;
        }

        nav a::after {
            content: "";
            position: absolute;
            width: 0%;
            height: 2px;
            background: #00e0ff;
            left: 0;
            bottom: -5px;
            transition: 0.3s;
        }

        nav a:hover::after {
            width: 100%;
        }

        /* MAIN CONTENT */
        main {
            text-align: center;
            margin-top: 100px;
            padding: 20px;
        }

        main h2 {
            font-size: 2.2rem;
            margin-bottom: 15px;
        }

        main p {
            font-size: 1.1rem;
            margin: 10px 0;
            opacity: 0.9;
        }

        /* BUTTON */
        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 25px;
            background: #00e0ff;
            color: black;
            font-weight: bold;
            border-radius: 25px;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            background: #00bcd4;
        }
    </style>
</head>

<body>

<header>
    <h1>🗺️ Carleton Map</h1>
    <nav>
        <a href="#">Home</a>
        <a href="map.html">Map</a>
    </nav>
</header>

<main>
    <h2>Welcome</h2>
    <p>Explore the Carleton University campus with an interactive map.</p>
    <p>Find buildings, navigate easily, and discover key locations.</p>

    <!-- CTA BUTTON -->
    <a href="map.html" class="btn">Open Map</a>
</main>

</body>
</html>
