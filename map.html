<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Map | Carleton Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />

    <link rel="stylesheet" href="CSS/map-style.css">
</head>

<body>

<nav>
    <a href="./index.html">Home</a>
    <a class="active" href="#">Map</a>
</nav>

<h2>🗺️ Campus Map</h2>

<div class="controls-container">
    <button id="gotoUC" class="map-btn">
        Go to University Centre
    </button>

    <select id="startSelect" class="map-select">
        <option value="" selected disabled>Start Building...</option>
        <option value="UC">University Centre</option>
        <option value="Steacie">Steacie Building</option>
        <option value="Health Science">Health Science Building</option>
        <option value="Herzberg">Herzberg Laboratory</option>
        <option value="Richcraft">Richcraft Building</option>
        <option value="Paterson">Paterson Hall</option>
        <option value="Southam">Southam Hall</option>
        <option value="Mackenzie">Mackenzie Building</option>
        <option value="Minto">Minto Centre</option>
        <option value="Field House">Field House</option>
        <option value="Alumni">Alumni Hall</option>
        <option value="Nicol">Nicol Building</option>
        <option value="Tory">Canal/Tory Building</option>
        <option value="Azireli Pavilion">Azireli Pavilion</option>
        <option value="Azireli Theatre">Azireli Theatre</option>
        <option value="MacOdrum">MacOdrum Library</option>
        <option value="Ice House">Carleton Ice House</option>
        <option value="Architecture">Architecture Building</option>
    </select>

    <span style="font-weight: bold; font-size: 1.1rem;">TO</span>

    <select id="endSelect" class="map-select">
        <option value="" selected disabled>Destination...</option>
        <option value="UC">University Centre</option>
        <option value="Steacie">Steacie Building</option>
        <option value="Health Science">Health Science Building</option>
        <option value="Herzberg">Herzberg Laboratory</option>
        <option value="Richcraft">Richcraft Building</option>
        <option value="Paterson">Paterson Hall</option>
        <option value="Southam">Southam Hall</option>
        <option value="Mackenzie">Mackenzie Building</option>
        <option value="Minto">Minto Centre</option>
        <option value="Field House">Field House</option>
        <option value="Alumni">Alumni Hall</option>
        <option value="Nicol">Nicol Building</option>
        <option value="Tory">Canal/Tory Building</option>
        <option value="Azireli Pavilion">Azireli Pavilion</option>
        <option value="Azireli Theatre">Azireli Theatre</option>
        <option value="MacOdrum">MacOdrum Library</option>
        <option value="Ice House">Carleton Ice House</option>
        <option value="Architecture">Architecture Building</option>
    </select>

    <button id="routeBtn" class="map-btn" style="background: #BF112B; color: white;">Get Directions</button>

    <button id="resetBtn" class="map-btn" style="background: #1a1a1a; color: white;">Reset</button>
</div>

<div class="map-container">
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<script src="Scripts/TopMapOverlay.js"></script>
<script src="Scripts/Tunnels.js"></script>
<script src="Scripts/Navigation.js"></script>
<script src="Scripts/BuildingOverlay.js"></script>
<script src="Scripts/LandmarkOverlay.js"></script>
</body>
</html>
