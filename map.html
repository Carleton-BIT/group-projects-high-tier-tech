
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Map | Carleton Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
        }

        /* NAVBAR */
        nav {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 15px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        nav a {
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            position: relative;
            transition: 0.3s;
        }

        nav a::after {
            content: "";
            position: absolute;
            width: 0%;
            height: 2px;
            background: #00e0ff;
            left: 0;
            bottom: -5px;
            transition: 0.3s;
        }

        nav a:hover::after {
            width: 100%;
        }

        .active {
            color: #00e0ff;
        }

        /* TITLE */
        h2 {
            text-align: center;
            margin: 25px 0;
            font-size: 2rem;
        }

        /* MAP CONTAINER (just styling, not functionality) */
        .map-container {
            width: 90%;
            max-width: 1100px;
            margin: auto;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        #map {
            height: 600px;
            width: 100%;
        }
    </style>
</head>

<body>

<nav>
    <!-- FIXED HOME LINK -->
    <a href="./index.html">Home</a>
    <a class="active" href="#">Map</a>
</nav>

<h2>🗺️ Campus Map</h2>

<div class="map-container">
    <div id="map"></div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Your existing script (UNCHANGED) -->
<script src="Scripts/TopMapOverlay.js"></script>

</body>
</html>
